*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation}

/* Calculator base styles */

  width:100%; height:100dvh; min-height:100vh; overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch; padding:env(safe-area-inset-top, 40px) 20px env(safe-area-inset-bottom, 40px) 20px; box-sizing:border-box;
  display:flex; flex-direction:column; position:relative;
  background:linear-gradient(180deg,var(--calc-shell-top),var(--calc-shell-bottom));}body.edit-mode .calculator-shell { box-shadow: inset 0 0 0 4px #4A90E2; }
body.edit-mode .calc-key::after, body.edit-mode .calc-mini-key::after, body.edit-mode .calculator-display::after, body.edit-mode .calc-tool-panel::after, body.edit-mode .calc-tool-button::after, body.edit-mode #easter-egg-text::after {
  content:''; position:absolute; inset:0; border:3px solid #4A90E2; border-radius:inherit; opacity:0; pointer-events:none; z-index:99; transition:opacity .1s;
}
body.edit-mode .calc-key:active::after, body.edit-mode .calc-mini-key:active::after, body.edit-mode .calculator-display:active::after, body.edit-mode .calc-tool-panel:active::after, body.edit-mode .calc-tool-button:active::after, body.edit-mode #easter-egg-text:active::after { opacity:1; }
.calc-top-bar { display:flex; align-items:center; justify-content:space-between; margin-top:16px; margin-bottom:16px; padding:0 4px; }

.calc-close-btn:active{transform:translateY(3px);box-shadow:0 0 0 var(--calc-op-shadow),inset 0 2px 4px rgba(0,0,0,.1)}

.calculator-display{flex-shrink:0;min-height:124px;padding:14px 16px;border-radius:14px;background:var(--calc-display);border:4px solid color-mix(in srgb,var(--calc-shell-top) 80%,#000);border-bottom-color:color-mix(in srgb,var(--calc-shell-bottom) 60%,#fff);border-right-color:color-mix(in srgb,var(--calc-shell-bottom) 60%,#fff);box-shadow:inset 2px 4px 10px rgba(0,0,0,.3),inset -2px -2px 5px rgba(255,255,255,.4),0 2px 0 rgba(255,255,255,.6);text-align:right;color:var(--calc-display-text);cursor:pointer;position:relative;z-index:10;}

.calculator-value{margin-top:15px;font-family:ui-rounded, 'SF Pro Rounded', 'Helvetica Rounded', Arial, sans-serif;font-size:clamp(48px,12vw,80px);line-height:1.05;font-weight:600;letter-spacing:1.5px;overflow-wrap:anywhere;transform:scaleY(1.35);transform-origin:right bottom}

.calculator-display-actions{display:flex;align-items:center;justify-content:flex-end;gap:10px;margin:12px 2px 4px}
.calculator-signature-btn { margin-right:auto; padding: 0 10px; display: flex; align-items: center; justify-content: center; } .calculator-signature{width:70px;height:24px;object-fit:contain;mix-blend-mode:multiply;pointer-events:none;}

.calc-mini-key{min-height:42px;min-width:72px;padding:0 16px;border:none;border-radius:12px;font-size:20px;font-weight:600;color:#151515;background:linear-gradient(180deg,var(--calc-op-top),var(--calc-op-bottom));box-shadow:0 4px 0 var(--calc-op-shadow),0 6px 10px rgba(0,0,0,.16),inset 0 1px 0 rgba(255,255,255,.9);cursor:pointer}
.calc-mini-key.copy{font-size:13px}.calc-mini-key.sound{min-width:48px;padding:0 12px;font-size:19px}.calc-mini-key:active{transform:translateY(5px);box-shadow:0 0 0 var(--calc-op-shadow),inset 0 3px 5px rgba(0,0,0,.2)}

.calc-colors-overlay {
  position:absolute; top:auto; left:16px; right:16px; bottom:calc(env(safe-area-inset-bottom, 20px) + 20px); max-height:400px;
  background:var(--calc-display);
  border:1px solid rgba(52,35,28,.35); border-radius:14px;
  display:none; flex-direction:column; z-index:9; z-index:9;

}
.calc-colors-overlay.open { display:flex; }
.calc-colors-container {
  flex:1; padding:20px; display:flex; flex-wrap:wrap; gap:12px; align-content:flex-start; justify-content:center; overflow-y:auto;
}
.calc-color { width:44px; height:44px; border-radius:12px; border:2px solid rgba(255,255,255,.5); box-shadow:0 3px 6px rgba(0,0,0,.2); cursor:pointer; }
.calc-color:active { transform:translateY(2px); }
.calc-color-tooltip { position:absolute; bottom:115%; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.7); color:#fff; padding:4px 8px; border-radius:6px; font-size:11px; font-weight:600; white-space:nowrap; pointer-events:none; opacity:0; transition:opacity 0.2s; z-index:100; box-shadow:0 2px 6px rgba(0,0,0,0.2); }
.calc-color-custom:hover .calc-color-tooltip, .calc-color-custom:active .calc-color-tooltip { opacity:1; }
.calc-colors-actions { padding:12px; background:rgba(0,0,0,.05); border-top:1px solid rgba(0,0,0,.1); display:flex; justify-content:center; gap: 10px; }

.calc-colors-actions button:active { opacity: 0.8; }

.calc-copy-overlay { position:absolute; inset:0; z-index:100; background:rgba(0,0,0,0.5); display:none; align-items:center; justify-content:center; }
.calc-copy-overlay.open { display:flex; }
.calc-copy-menu { background:var(--calc-display); padding:20px; border-radius:16px; display:flex; flex-direction:column; gap:10px; min-width:240px; text-align:center;}
.calc-copy-menu h3 { margin-bottom:10px; font-size:18px; color:var(--calc-display-text);}
.calc-copy-menu button { padding:14px; border-radius:10px; border:none; background:var(--calc-op-bottom); font-size:16px; font-weight:bold; cursor:pointer;}
.calc-copy-menu button:active { opacity:0.8; }

.calculator-percent-tools{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:9px;margin-top:12px;background:var(--calc-tool-panel,var(--calc-shell-top));padding:10px;border-radius:12px;box-shadow:inset 0 2px 4px rgba(0,0,0,.05);position:relative}
.calc-tool-button{position:relative;overflow:hidden;flex:1;padding:12px 6px;font-size:clamp(10px,3vw,13px);font-weight:800;color:#151515;background:linear-gradient(180deg,var(--calc-tool-btn-top,rgba(255,255,255,.8)),var(--calc-tool-btn-bottom,rgba(255,255,255,.5)));border:1px solid rgba(0,0,0,.2);border-radius:10px;cursor:pointer;box-shadow:0 8px 0 var(--calc-tool-btn-shadow,rgba(0,0,0,.1)),0 11px 15px rgba(0,0,0,.26),inset 0 0 0 1px rgba(255,255,255,.6),inset 0 2px 1px rgba(255,255,255,.95)}.calc-tool-button::before{content:'';position:absolute;top:16%;left:16%;right:16%;bottom:8%;border-radius:40%;box-shadow:inset 0 4px 6px rgba(0,0,0,.08),inset 0 -4px 6px rgba(255,255,255,.3);background:radial-gradient(ellipse at center,rgba(0,0,0,.04) 0%,transparent 70%);pointer-events:none;transition:opacity .15s}.calc-tool-button:active, .calc-tool-button.active{transform:translateY(8px);box-shadow:0 0 0 var(--calc-tool-btn-shadow,rgba(0,0,0,.1)),inset 0 3px 5px rgba(0,0,0,.2)}.calc-tool-button:active::before, .calc-tool-button.active::before{opacity:0.4}
#calc-discount-button{--calc-tool-btn-top:color-mix(in srgb,var(--calc-tool-btn-discount,#FFF) 80%,#FFF);--calc-tool-btn-bottom:var(--calc-tool-btn-discount,rgba(255,255,255,.5));--calc-tool-btn-shadow:color-mix(in srgb,var(--calc-tool-btn-discount,rgba(0,0,0,.1)) 75%,#000);}
#calc-increase-button{--calc-tool-btn-top:color-mix(in srgb,var(--calc-tool-btn-increase,#FFF) 80%,#FFF);--calc-tool-btn-bottom:var(--calc-tool-btn-increase,rgba(255,255,255,.5));--calc-tool-btn-shadow:color-mix(in srgb,var(--calc-tool-btn-increase,rgba(0,0,0,.1)) 75%,#000);}
#calc-vat-button{--calc-tool-btn-top:color-mix(in srgb,var(--calc-tool-btn-vat,#FFF) 80%,#FFF);--calc-tool-btn-bottom:var(--calc-tool-btn-vat,rgba(255,255,255,.5));--calc-tool-btn-shadow:color-mix(in srgb,var(--calc-tool-btn-vat,rgba(0,0,0,.1)) 75%,#000);}
.calc-tool-panel{display:none;margin-top:10px;padding:12px;border:1px solid rgba(52,35,28,.18);border-radius:12px;background:var(--calc-percent-panel-bg, rgba(255,255,255,.42))}.calc-tool-panel.open{display:block}.calc-tool-fields{display:grid;grid-template-columns:minmax(0,1fr) 92px;gap:9px}.calc-tool-field label{display:block;margin-bottom:4px;color:var(--calc-display-text);font-size:11px;font-weight:600}.calc-tool-field input{width:100%;min-height:42px;padding:8px 10px;border:1.5px solid rgba(52,35,28,.28);border-radius:9px;background:var(--calc-tool-inputs, rgba(255,255,255,.82));color:#151515;font-size:18px;text-align:right; cursor:pointer}.calc-tool-calculate{position:relative;overflow:hidden;width:100%;min-height:42px;margin-top:9px;border:1px solid rgba(255,255,255,.7);border-radius:10px;color:#151515;font-weight:600;background:linear-gradient(180deg,var(--calc-tool-calc-top,color-mix(in srgb,var(--calc-tool-calc-btn,var(--calc-accent)) 55%,#fff 45%)),var(--calc-tool-calc-bottom,var(--calc-tool-calc-btn,var(--calc-accent))));box-shadow:0 8px 0 var(--calc-tool-calc-shadow,var(--calc-accent-dark)),0 11px 15px rgba(0,0,0,.26),inset 0 2px 1px rgba(255,255,255,.95);cursor:pointer;--calc-tool-calc-top:color-mix(in srgb,var(--calc-tool-calc-btn,var(--calc-accent)) 80%,#FFF);--calc-tool-calc-bottom:var(--calc-tool-calc-btn,var(--calc-accent));--calc-tool-calc-shadow:color-mix(in srgb,var(--calc-tool-calc-btn,var(--calc-accent-dark)) 75%,#000);}.calc-tool-calculate:active{transform:translateY(8px);box-shadow:0 0 0 var(--calc-tool-calc-shadow,var(--calc-accent-dark)),inset 0 3px 5px rgba(0,0,0,.2)}.calc-tool-calculate::before{content:'';position:absolute;top:12%;left:16%;right:16%;bottom:12%;border-radius:40%;box-shadow:inset 0 4px 6px rgba(0,0,0,.08),inset 0 -4px 6px rgba(255,255,255,.3);background:radial-gradient(ellipse at center,rgba(0,0,0,.04) 0%,transparent 70%);pointer-events:none;transition:opacity .15s}.calc-tool-calculate:active::before{opacity:0.4}.calc-tool-result{min-height:0;margin-top:10px;padding:9px 11px;border-radius:9px;background:var(--calc-display);color:var(--calc-display-text);font-size:13px;line-height:1.45}

.calculator-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px; padding-top: 10px;}
.calc-key{position:relative;overflow:hidden;min-height:clamp(58px, 15vh, 80px);border:1px solid rgba(255,255,255,.72);border-radius:10px;font-size:30px;font-weight:400;color:#151515;background:linear-gradient(180deg,var(--calc-num-top),var(--calc-num-bottom));box-shadow:0 8px 0 var(--calc-num-shadow),0 11px 15px rgba(0,0,0,.26),inset 0 2px 1px rgba(255,255,255,.95);cursor:pointer}.calc-key::before{content:'';position:absolute;top:12%;left:16%;right:16%;bottom:12%;border-radius:40%;box-shadow:inset 0 4px 6px rgba(0,0,0,.08),inset 0 -4px 6px rgba(255,255,255,.3);background:radial-gradient(ellipse at center,rgba(0,0,0,.04) 0%,transparent 70%);pointer-events:none;transition:opacity .15s}.calc-key:active{transform:translateY(8px);box-shadow:0 0 0 var(--calc-num-shadow),inset 0 3px 5px rgba(0,0,0,.2)}.calc-key:active::before{opacity:0.4}.calc-key.op{background:linear-gradient(180deg,var(--calc-op-top),var(--calc-op-bottom));box-shadow:0 8px 0 var(--calc-op-shadow),0 11px 15px rgba(0,0,0,.26),inset 0 2px 1px rgba(255,255,255,.95)}.calc-key.op:active{box-shadow:0 0 0 var(--calc-op-shadow),inset 0 3px 5px rgba(0,0,0,.2)}.calc-key.clear{background:linear-gradient(180deg,var(--calc-clear-top),var(--calc-clear-bottom));box-shadow:0 8px 0 var(--calc-clear-shadow),0 11px 15px rgba(0,0,0,.26),inset 0 2px 1px rgba(255,255,255,.95)}.calc-key.clear:active{box-shadow:0 0 0 var(--calc-clear-shadow),inset 0 3px 5px rgba(0,0,0,.2)}.calc-key.top-op{background:linear-gradient(180deg,var(--calc-top-op-top, var(--calc-clear-top)),var(--calc-top-op-bottom, var(--calc-clear-bottom)));box-shadow:0 8px 0 var(--calc-top-op-shadow, var(--calc-clear-shadow)),0 11px 15px rgba(0,0,0,.26),inset 0 2px 1px rgba(255,255,255,.95)}.calc-key.top-op:active{box-shadow:0 0 0 var(--calc-top-op-shadow, var(--calc-clear-shadow)),inset 0 3px 5px rgba(0,0,0,.2)}.calc-key.equals{background:linear-gradient(180deg,color-mix(in srgb,var(--calc-accent) 55%,#fff 45%),var(--calc-accent));box-shadow:0 8px 0 var(--calc-accent-dark),0 11px 15px rgba(0,0,0,.26),inset 0 2px 1px rgba(255,255,255,.95)}.calc-key.equals:active{box-shadow:0 0 0 var(--calc-accent-dark),inset 0 3px 5px rgba(0,0,0,.2)}

/* History Overlay Styles */
.calc-history-overlay {
  position:absolute; top:calc(env(safe-area-inset-top, 20px) + 160px); left:16px; right:16px; bottom:env(safe-area-inset-bottom, 20px);
  background:var(--calc-display);
  border:1px solid rgba(52,35,28,.35); border-radius:14px;
  display:none; flex-direction:column; z-index:9;
  box-shadow:0 10px 30px rgba(0,0,0,.15);
  overflow:hidden;
}
.calc-history-overlay.open { display:flex; }
.calc-history-list {
  flex:1; overflow-y:auto; padding:10px; display:flex; flex-direction:column; gap:8px;
}
.calc-history-item {
  border-bottom:1px solid rgba(52,35,28,.15); padding:12px; text-align:right;
  color:var(--calc-display-text); font-size:24px; position:relative;
}
.calc-history-item:last-child { border-bottom:none; }
.calc-history-item .hist-expr { font-size:18px; color:color-mix(in srgb,var(--calc-display-text) 60%,transparent); border-bottom:1px solid rgba(52,35,28,.3); display:inline-block; padding-bottom:4px; margin-bottom:4px;}
.calc-history-item .hist-date { position:absolute; top:12px; left:12px; font-size:10px; color:color-mix(in srgb,var(--calc-display-text) 50%,transparent); }
.calc-history-item .hist-icon { position:absolute; top:12px; right:12px; font-size:14px; opacity:0.5; }

.calc-history-actions {
  display:grid; grid-template-columns:1fr 1fr; gap:1px; background:rgba(52,35,28,.3);
}
.calc-history-actions button {
  background:#6b645b; color:white; border:none; padding:16px; font-size:15px; font-weight:800; cursor:pointer;
}
.calc-history-actions button:active { background:#555049; }

@media(max-width:430px){
  .calculator-signature{width:60px; height:20px;}.calculator-display-actions{gap:7px}
  .calc-mini-key{min-width:58px;padding:0 11px}.calc-mini-key.sound{min-width:44px;padding:0 9px}
  .calculator-grid{gap:8px}
}
</style>

<body ontouchstart="">
<div class="calculator-shell" id="calculator-shell" onclick="if(typeof isEditMode!=='undefined' && isEditMode) handleEditModeSelect('shell')">

      <div style="font-size:12px; font-weight:800; text-transform:uppercase; opacity:0.9;">🎨 Editando:</div>

    </div>
    <div style="display:flex; align-items:center; gap:6px;"><button onclick="deleteCurrentCustomTheme()" title="Borrar diseño" style="background:#ff4d4d; color:white; border:none; padding:8px 10px; border-radius:10px; font-weight:bold; cursor:pointer; font-size:14px; box-shadow: 0 2px 5px rgba(0,0,0,0.2);">🗑️</button><button onclick="renameCurrentCustomTheme()" title="Renombrar diseño" style="background:#fff; color:#4A90E2; border:none; padding:8px 10px; border-radius:10px; font-weight:bold; cursor:pointer; font-size:14px; box-shadow: 0 2px 5px rgba(0,0,0,0.2);">✏️</button><button onclick="saveAsNewTheme()" style="background:#fff; color:#4A90E2; border:none; padding:8px 8px; border-radius:10px; font-weight:bold; cursor:pointer; font-size:14px; box-shadow: 0 2px 5px rgba(0,0,0,0.2);">➕ Nuevo</button><button onclick="saveCustomTheme()" style="background:#fff; color:#4A90E2; border:none; padding:8px 8px; border-radius:10px; font-weight:bold; cursor:pointer; font-size:14px; box-shadow: 0 2px 5px rgba(0,0,0,0.2);">💾 Guardar</button><input type="color" id="edit-color-picker" oninput="if(isEditMode) applyCustomColor(currentEditType, this.value)" style="width:48px; height:48px; border:3px solid white; border-radius:10px; background:white; cursor:pointer; padding:0;"></div>
  </div>

  <div class="calculator-display" onclick="handleDisplayClick()">

  </div>

    <button onclick="handleColorsEditModal(2)" style="width:100%; padding:14px; margin-bottom:16px; background:#f0f0f0; border:none; border-radius:10px; font-weight:bold; font-size:15px; color:#151515; cursor:pointer;">2. Abrir Temas</button>

  </div>
</div>

    </div>
  </div>

      <button onclick="toggleCopyMenu()">Cancelar</button>

  </div>

function updateCalc(){
  showingEasterEgg = false;
  const value=document.getElementById('calc-value'),expression=document.getElementById('calc-expression'),sound=document.getElementById('calc-sound');
  if(value)value.textContent=CALC_CURRENT.replace('.',',');
  if(expression)expression.textContent=CALC_PREVIOUS!==null&&CALC_OPERATOR?`${formatCalcValue(CALC_PREVIOUS)} ${CALC_OPERATOR.replace('*','×').replace('/','÷')}`:'';
  if(sound){sound.textContent=CALC_SOUND?'🔊':'🔇';sound.title=CALC_SOUND?'Desactivar sonido':'Activar sonido';}
}

function calculateCalcValues(){
  const a=Number(CALC_PREVIOUS),b=Number(CALC_CURRENT);let result=b;
  let opSymbol = CALC_OPERATOR;
  if(CALC_OPERATOR==='+')result=a+b;if(CALC_OPERATOR==='-')result=a-b;
  if(CALC_OPERATOR==='*'){result=a*b; opSymbol = '×';}
  if(CALC_OPERATOR==='/'){result=b===0?NaN:a/b; opSymbol = '÷';}
  
  // Save to history
  if (CALC_PREVIOUS !== null && CALC_OPERATOR) {
    saveToHistory(formatCalcValue(a), opSymbol, formatCalcValue(b), formatCalcValue(result));
  }
  
  CALC_CURRENT=formatCalcValue(result).replace(',','.');CALC_PREVIOUS=null;CALC_OPERATOR='';CALC_JUST_EVALUATED=true;
}

function saveToHistory(a, op, b, res) {
  const date = new Date().toLocaleDateString('es-ES', {day: 'numeric', month: 'short', hour:'2-digit', minute:'2-digit'}).toUpperCase();
  CALC_HISTORY.unshift({ a, op, b, res, date });
  if (CALC_HISTORY.length > 50) CALC_HISTORY.pop();
  lsSet('hogar_calc_history', JSON.stringify(CALC_HISTORY));
  renderHistory();
}

function loadHistory() {
  try {
    CALC_HISTORY = JSON.parse(lsGet('hogar_calc_history')) || [];
  } catch(e) { CALC_HISTORY = []; }
  renderHistory();
}

function renderHistory() {
  const list = document.getElementById('calc-history-list');
  if (!list) return;
  if (CALC_HISTORY.length === 0) {
    list.innerHTML = '<div style="text-align:center; padding: 20px; color:rgba(0,0,0,0.4); font-weight:800; font-size:14px;">No hay operaciones guardadas</div>';
    return;
  }
  list.innerHTML = CALC_HISTORY.map(h => `
    <div class="calc-history-item">
      <div class="hist-date">${h.date}</div>
      <div class="hist-icon">💬</div>
      <div class="hist-expr">${h.a} ${h.op} ${h.b}</div>
      <div>= ${h.res}</div>
    </div>
  `).join('');
}

function calcBeep(){
  if(!CALC_SOUND)return;
  try{
    const Ctx=window.AudioContext||window.webkitAudioContext;
    CALC_AUDIO=CALC_AUDIO||new Ctx();
    const osc=CALC_AUDIO.createOscillator(),gain=CALC_AUDIO.createGain(),now=CALC_AUDIO.currentTime;
    osc.type='sine';osc.frequency.setValueAtTime(520,now);osc.frequency.exponentialRampToValueAtTime(230,now+.045);
    gain.gain.setValueAtTime(.035,now);gain.gain.exponentialRampToValueAtTime(.001,now+.05);
    osc.connect(gain);gain.connect(CALC_AUDIO.destination);
    osc.start(now);osc.stop(now+.055);
  }catch(e){}
}
function toggleCalculatorSound(){CALC_SOUND=!CALC_SOUND;lsSet('hogar_calc_sound',CALC_SOUND?'1':'0');updateCalc();calcBeep();}

function handleCalcKey(v){
  if (v === 'colors' && typeof isEditMode !== 'undefined' && isEditMode) {
     document.getElementById('colors-edit-modal').style.display = 'flex';
     return;
  }
  if (typeof isEditMode!=='undefined' && isEditMode) { handleEditModeSelect('key', v); return; }
  if(v==='colors'){toggleCalculatorPalette();return;}
  if(v==='sound'){toggleCalculatorSound();return;}
  if(v==='elibi'){showEasterEgg();return;}
  calcBeep();
  if(v==='copy'){toggleCopyMenu();return;}
  if(ACTIVE_TOOL_INPUT) {
    const el = document.getElementById(`calc-tool-${ACTIVE_TOOL_INPUT}`);
    if(el) {
      let val = el.value || '';
      if(v==='C') val = '';
      else if(v==='back' || v==='back_top') val = val.length > 1 ? val.slice(0,-1) : '';
      else if(/^\d$/.test(v)) val += v;
      else if(v==='.' || v===',') { if(!val.includes(',') && !val.includes('.')) val += ','; }
      el.value = val;
    }
    calcBeep();
    return;
  }
  if(/^\d$/.test(v)){CALC_CURRENT=CALC_CURRENT==='0'||CALC_JUST_EVALUATED?v:CALC_CURRENT+v;CALC_JUST_EVALUATED=false;}
  else if(v==='.' || v===','){if(CALC_JUST_EVALUATED)CALC_CURRENT='0';if(!CALC_CURRENT.includes('.'))CALC_CURRENT+='.';CALC_JUST_EVALUATED=false;}
  else if(v==='C'){CALC_CURRENT='0';CALC_PREVIOUS=null;CALC_OPERATOR='';CALC_JUST_EVALUATED=false;}
  else if(v==='back' || v==='back_top')CALC_CURRENT=CALC_CURRENT.length>1?CALC_CURRENT.slice(0,-1):'0';
  else if(v==='+/-')CALC_CURRENT=String((Number(CALC_CURRENT)||0)*-1);
  else if(v==='%'){const p=(Number(CALC_CURRENT)||0)/100;CALC_CURRENT=String(CALC_PREVIOUS!==null&&['+','-'].includes(CALC_OPERATOR)?Number(CALC_PREVIOUS)*p:p);}
  else if(['+','-','*','/'].includes(v)){if(CALC_PREVIOUS!==null&&CALC_OPERATOR&&!CALC_JUST_EVALUATED)calculateCalcValues();CALC_PREVIOUS=Number(CALC_CURRENT);CALC_OPERATOR=v;CALC_JUST_EVALUATED=true;}
  else if(v==='='&&CALC_PREVIOUS!==null&&CALC_OPERATOR)calculateCalcValues();
  updateCalc();
}

function setCalculatorTheme(theme){
  const root=document.getElementById('calculator-shell');if(!root||!theme)return;
  [['accent','--calc-accent'],['dark','--calc-accent-dark'],['shellTop','--calc-shell-top'],['shellBottom','--calc-shell-bottom'],['display','--calc-display'],['displayText','--calc-display-text'],['numTop','--calc-num-top'],['numBottom','--calc-num-bottom'],['numShadow','--calc-num-shadow'],['opTop','--calc-op-top'],['opBottom','--calc-op-bottom'],['opShadow','--calc-op-shadow'],['clearTop','--calc-clear-top'],['clearBottom','--calc-clear-bottom'],['clearShadow','--calc-clear-shadow']].forEach(([key,prop])=>{
    if(theme[key]) root.style.setProperty(prop,theme[key]);
    else root.style.removeProperty(prop);
  });
  if(theme.topOpTop){
    root.style.setProperty('--calc-top-op-top',theme.topOpTop);
    root.style.setProperty('--calc-top-op-bottom',theme.topOpBottom);
    root.style.setProperty('--calc-top-op-shadow',theme.topOpShadow);
  } else {
    root.style.setProperty('--calc-top-op-top',theme.clearTop);
    root.style.setProperty('--calc-top-op-bottom',theme.clearBottom);
    root.style.setProperty('--calc-top-op-shadow',theme.clearShadow);
  }

  if (theme.toolPanel) root.style.setProperty('--calc-tool-panel', theme.toolPanel);
  if (theme.toolPanelBg) root.style.setProperty('--calc-percent-panel-bg', theme.toolPanelBg); else root.style.removeProperty('--calc-percent-panel-bg');
  else root.style.removeProperty('--calc-tool-panel');
  if (theme.toolInputs) root.style.setProperty('--calc-tool-inputs', theme.toolInputs);
  else root.style.removeProperty('--calc-tool-inputs');
  if (theme.toolCalcBtn) root.style.setProperty('--calc-tool-calc-btn', theme.toolCalcBtn);
  else root.style.removeProperty('--calc-tool-calc-btn');

  if (theme.toolBtnDiscount) root.style.setProperty('--calc-tool-btn-discount', theme.toolBtnDiscount); else root.style.removeProperty('--calc-tool-btn-discount');
  if (theme.toolBtnIncrease) root.style.setProperty('--calc-tool-btn-increase', theme.toolBtnIncrease); else root.style.removeProperty('--calc-tool-btn-increase');
  if (theme.toolBtnVat) root.style.setProperty('--calc-tool-btn-vat', theme.toolBtnVat); else root.style.removeProperty('--calc-tool-btn-vat');

  if (theme.easterEgg) root.style.setProperty('--calc-easter-egg', theme.easterEgg);
  else root.style.removeProperty('--calc-easter-egg');

  document.querySelectorAll('.calc-key, .calc-mini-key').forEach(btn => {
    btn.style.removeProperty('--calc-num-top');
    btn.style.removeProperty('--calc-num-bottom');
    btn.style.removeProperty('--calc-num-shadow');
    btn.style.removeProperty('--calc-op-top');
    btn.style.removeProperty('--calc-op-bottom');
    btn.style.removeProperty('--calc-op-shadow');
    btn.style.removeProperty('--calc-clear-top');
    btn.style.removeProperty('--calc-clear-bottom');
    btn.style.removeProperty('--calc-clear-shadow');
    btn.style.removeProperty('--calc-top-op-top');
    btn.style.removeProperty('--calc-top-op-bottom');
    btn.style.removeProperty('--calc-top-op-shadow');
    btn.style.removeProperty('--calc-accent');
    btn.style.removeProperty('--calc-accent-dark');
  });

  if (theme.keys) {
    for (let key in theme.keys) {
      let btn = document.querySelector(`[data-calc="${key}"]`);
      if (btn) {
         let colors = theme.keys[key];
         if (btn.classList.contains('op') || btn.classList.contains('calc-mini-key')) {
           btn.style.setProperty('--calc-op-top', colors.top);
           btn.style.setProperty('--calc-op-bottom', colors.bottom);
           btn.style.setProperty('--calc-op-shadow', colors.shadow);
         } else if (btn.classList.contains('clear')) {
           btn.style.setProperty('--calc-op-top', colors.top);
           btn.style.setProperty('--calc-op-bottom', colors.bottom);
           btn.style.setProperty('--calc-op-shadow', colors.shadow);
         } else if (btn.classList.contains('clear')) {
           btn.style.setProperty('--calc-clear-top', colors.top);
           btn.style.setProperty('--calc-clear-bottom', colors.bottom);
           btn.style.setProperty('--calc-clear-shadow', colors.shadow);
         } else if (btn.classList.contains('top-op')) {
           btn.style.setProperty('--calc-top-op-top', colors.top);
           btn.style.setProperty('--calc-top-op-bottom', colors.bottom);
           btn.style.setProperty('--calc-top-op-shadow', colors.shadow);
         } else if (btn.classList.contains('equals')) {
           btn.style.setProperty('--calc-accent', colors.top);
           btn.style.setProperty('--calc-accent-dark', colors.shadow);
         } else {
           btn.style.setProperty('--calc-num-top', colors.top);

function toggleCalcPercentTool(tool){
  const panel=document.getElementById('calc-percent-panel'),result=document.getElementById('calc-tool-result'),label=document.getElementById('calc-tool-percent-label');
  CALC_PERCENT_TOOL=panel.classList.contains('open')&&CALC_PERCENT_TOOL===tool?'':tool;panel.classList.toggle('open',Boolean(CALC_PERCENT_TOOL));
  ['discount','increase','vat'].forEach(k=>document.getElementById(`calc-${k}-button`)?.classList.toggle('active',CALC_PERCENT_TOOL===k));
  if(label)label.textContent=CALC_PERCENT_TOOL==='vat'?'IVA %':'Porcentaje %';
  if(result)result.textContent=CALC_PERCENT_TOOL==='vat'?'Escribe el precio con IVA y el porcentaje de IVA.':CALC_PERCENT_TOOL==='increase'?'Escribe el importe y el porcentaje que quieres sumar.':'Escribe el importe y el porcentaje que quieres quitar.';
  if(CALC_PERCENT_TOOL) setActiveToolInput('amount');
  else setActiveToolInput(null);

function setActiveToolInput(inputId) {
  ACTIVE_TOOL_INPUT = inputId;
  const amt = document.getElementById('calc-tool-amount');
  const pct = document.getElementById('calc-tool-percent');
  if(amt) amt.style.boxShadow = inputId === 'amount' ? '0 0 0 3px #4A90E2' : 'none';

function calcToolNumber(value){const n=Number(String(value||'').trim().replace(/\s/g,'').replace(',','.'));return Number.isFinite(n)?n:NaN;}
function calcMoney(value){return Number(value).toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2});}
function calculateCalcPercentTool(){
  const amount=calcToolNumber(document.getElementById('calc-tool-amount')?.value),percent=calcToolNumber(document.getElementById('calc-tool-percent')?.value),result=document.getElementById('calc-tool-result');
  if(!result||!CALC_PERCENT_TOOL)return;if(!Number.isFinite(amount)||!Number.isFinite(percent)||amount<0||percent<0){result.textContent='Introduce un importe y un porcentaje válidos.';return;}calcBeep();
  let finalAmount = 0; let explanation = ''; let historyExpr = '';
  if(CALC_PERCENT_TOOL==='discount'){
    const removed=amount*percent/100; finalAmount=amount-removed;
    explanation=`Se han quitado ${calcMoney(removed)} € (${formatCalcValue(percent)} %).`;
    historyExpr = `${formatCalcValue(amount)} - ${formatCalcValue(percent)}%`;
  }
  else if(CALC_PERCENT_TOOL==='increase'){
    const added=amount*percent/100; finalAmount=amount+added;
    explanation=`Se han sumado ${calcMoney(added)} € (${formatCalcValue(percent)} %).`;
    historyExpr = `${formatCalcValue(amount)} + ${formatCalcValue(percent)}%`;
  }
  else {
    finalAmount=amount/(1+percent/100);
    explanation=`IVA incluido extraído: ${calcMoney(amount-finalAmount)} € (${formatCalcValue(percent)} %).`;
    historyExpr = `Sin IVA (${formatCalcValue(percent)}%) de ${formatCalcValue(amount)}`;
  }
  result.innerHTML = explanation;
  CALC_CURRENT = String(finalAmount); CALC_PREVIOUS = null; CALC_OPERATOR = ''; CALC_JUST_EVALUATED = true;
  updateCalc();
  if (typeof saveToHistory === 'function') saveToHistory(historyExpr, '', '', calcMoney(finalAmount));
}


function getCustomThemes() { try { return JSON.parse(localStorage.getItem('hogar_calc_custom_themes') || '[]'); } catch(e) { return []; } }
function setCustomThemes(themes) { localStorage.setItem('hogar_calc_custom_themes', JSON.stringify(themes)); }
function saveCustomTheme() {
  if (!currentCustomTheme) return;
  const themes = getCustomThemes();
  
  if (currentCustomTheme.id) {
    if (confirm('¿Estás seguro de que quieres SOBREESCRIBIR el diseño "' + currentCustomTheme.name + '"?')) {
      const idx = themes.findIndex(t => t.id === currentCustomTheme.id);
      if (idx !== -1) {
        themes[idx] = JSON.parse(JSON.stringify(currentCustomTheme));
        setCustomThemes(themes);
        renderThemes();
        alert('Diseño actualizado correctamente.');
        return;
      }
    }
  } else {
    saveAsNewTheme();
  }
}

function saveAsNewTheme() {
  if (!currentCustomTheme) return;
  const themes = getCustomThemes();
  
  const name = prompt('Nombre para tu NUEVO diseño:', currentCustomTheme.name ? currentCustomTheme.name + ' (Copia)' : 'Mi Diseño');
  if (!name) return;
  
  const existingIdx = themes.findIndex(t => t.name === name);
  if (existingIdx !== -1) {
    if (confirm(`Ya existe un diseño con el nombre "${name}". ¿Quieres SOBREESCRIBIRLO?`)) {
      currentCustomTheme.id = themes[existingIdx].id;
      currentCustomTheme.name = name;
      themes[existingIdx] = JSON.parse(JSON.stringify(currentCustomTheme));
      setCustomThemes(themes);
      renderThemes();
      alert('Diseño actualizado correctamente.');
      return;
    } else {
      return;
    }
  }
  
  currentCustomTheme.name = name;
  currentCustomTheme.id = Date.now().toString();
  themes.push(JSON.parse(JSON.stringify(currentCustomTheme)));
  setCustomThemes(themes);
  renderThemes();
  alert('Diseño "' + name + '" guardado correctamente.');
}

function renameCurrentCustomTheme() {
  if (!currentCustomTheme) return;
  const newName = prompt('Nombre para tu diseño:', currentCustomTheme.name || 'Mi Diseño');
  if (!newName || newName === currentCustomTheme.name) return;
  
  const themes = getCustomThemes();
  if (themes.some(t => t.name === newName)) {
     alert('Ya existe un diseño con ese nombre.');
     return;
  }
  
  currentCustomTheme.name = newName;
  if (currentCustomTheme.id) {
     const idx = themes.findIndex(t => t.id === currentCustomTheme.id);
     if (idx !== -1) {
        themes[idx].name = newName;
        setCustomThemes(themes);
        renderThemes();
     }
  }
  
  // Show the new name in the edit bar immediately
  document.getElementById('edit-mode-target').innerText = newName;
  
  if (currentCustomTheme.id) {
      alert('Diseño renombrado a: ' + newName);
  } else {
      alert('Nombre establecido. Recuerda Guardar para no perder los cambios.');
  }
}

function deleteCurrentCustomTheme() {

    alert('Este diseño aún no está guardado, no se puede borrar.');

  if(confirm('¿Estás seguro de que quieres borrar este diseño guardado?')) {
    const themes = getCustomThemes();
    const idx = themes.findIndex(t => t.id === currentCustomTheme.id);
    if (idx !== -1) {

function handleEditModeSelect(type, val) {
  if (typeof event !== 'undefined' && event) {
    if (event.target.closest('.calc-colors-actions') || event.target.closest('#calc-colors-overlay') || event.target.closest('#edit-top-bar')) return;
    event.stopPropagation();
  }

  let editType = '';
  let name = '';
  if (type === 'display') { editType = 'display'; name = 'Pantalla'; }
  else if (type === 'shell') { editType = 'shell'; name = 'Fondo'; }
  else if (type === 'toolpanel') { editType = 'toolpanel'; name = 'Fondo Panel Descuento'; }
  else if (type === 'toolpanel_inputs') { editType = 'toolpanel_inputs'; name = 'Cajas de Texto'; }
  else if (type === 'toolpanel_calc_btn') { editType = 'toolpanel_calc_btn'; name = 'Botón Calcular'; }
  else if (type === 'toolbtn_discount') { editType = 'toolbtn_discount'; name = 'Botón Descuento'; }
  else if (type === 'toolbtn_increase') { editType = 'toolbtn_increase'; name = 'Botón Aumento'; }
  else if (type === 'toolbtn_vat') { editType = 'toolbtn_vat'; name = 'Botón IVA'; }
  else if (type === 'easteregg') { editType = 'easteregg'; name = 'Frase Motivadora'; }
  else if (type === 'key') {
     editType = 'key_' + val;
     name = 'Botón ' + val;
  }
  
  if (editType) {
    currentEditType = editType;
    document.getElementById('edit-mode-target').innerText = name;
    
    let hex = '#ffffff';
    if (currentCustomTheme) {
      if (editType === 'display' && currentCustomTheme.display) hex = currentCustomTheme.display;
      else if (editType === 'shell' && currentCustomTheme.shellTop) hex = currentCustomTheme.shellTop;
      else if (editType === 'toolpanel' && currentCustomTheme.toolPanel) hex = currentCustomTheme.toolPanel;
      else if (editType === 'toolpanel_bg' && currentCustomTheme.toolPanelBg) hex = currentCustomTheme.toolPanelBg;
      else if (editType === 'toolpanel_inputs' && currentCustomTheme.toolInputs) hex = currentCustomTheme.toolInputs;
      else if (editType === 'toolpanel_calc_btn' && currentCustomTheme.toolCalcBtn) hex = currentCustomTheme.toolCalcBtn;
      else if (editType === 'toolbtn_discount' && currentCustomTheme.toolBtnDiscount) hex = currentCustomTheme.toolBtnDiscount;
      else if (editType === 'toolbtn_increase' && currentCustomTheme.toolBtnIncrease) hex = currentCustomTheme.toolBtnIncrease;
      else if (editType === 'toolbtn_vat' && currentCustomTheme.toolBtnVat) hex = currentCustomTheme.toolBtnVat;
      else if (editType === 'easteregg' && currentCustomTheme.easterEgg) hex = currentCustomTheme.easterEgg;
      else if (editType.startsWith('key_') && currentCustomTheme.keys) {
         let k = editType.substring(4);
         if (currentCustomTheme.keys[k] && currentCustomTheme.keys[k].top) {
           hex = currentCustomTheme.keys[k].top;
         }
      }
    }
    
    if (/^#[0-9A-F]{6}$/i.test(hex)) {
      document.getElementById('edit-color-picker').value = hex;
    } else {
      document.getElementById('edit-color-picker').value = '#ffffff';
    }
  }
}

function hexToRgb(hex) {
  let c = hex.substring(1);
  if(c.length === 3) c = c.split('').map(x=>x+x).join('');
  return [parseInt(c.substr(0,2),16), parseInt(c.substr(2,2),16), parseInt(c.substr(4,2),16)];
}

function rgbToHex(r,g,b) {
  return "#" + ((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
}

function adjustBrightness(hex, factor) {
  let [r,g,b] = hexToRgb(hex);
  r = Math.max(0, Math.min(255, r * factor));
  g = Math.max(0, Math.min(255, g * factor));
  b = Math.max(0, Math.min(255, b * factor));
  return rgbToHex(Math.round(r), Math.round(g), Math.round(b));
}

function applyCustomColor(type, baseHex) {
  if(!currentCustomTheme) currentCustomTheme = {name:'Mi Diseño'};
  
  if (type === 'display') {
    currentCustomTheme.display = baseHex;
    currentCustomTheme.displayText = adjustBrightness(baseHex, 0.2);
  } else if (type === 'shell') {
    currentCustomTheme.shellTop = baseHex;
    currentCustomTheme.shellBottom = adjustBrightness(baseHex, 0.9);
  } else if (type === 'toolpanel_bg') { currentCustomTheme.toolPanelBg = baseHex; } else if (type === 'toolpanel') {
    currentCustomTheme.toolPanel = baseHex;
  } else if (type === 'toolpanel_inputs') {
    currentCustomTheme.toolInputs = baseHex;
  } else if (type === 'toolpanel_calc_btn') {
    currentCustomTheme.toolCalcBtn = baseHex;
  } else if (type === 'toolbtn_discount') {
    currentCustomTheme.toolBtnDiscount = baseHex;
  } else if (type === 'toolbtn_increase') {
    currentCustomTheme.toolBtnIncrease = baseHex;
  } else if (type === 'toolbtn_vat') {
    currentCustomTheme.toolBtnVat = baseHex;
  } else if (type === 'easteregg') {
    currentCustomTheme.easterEgg = baseHex;
  } else if (type.startsWith('key_')) {
    let keyVal = type.substring(4);
    if (!currentCustomTheme.keys) currentCustomTheme.keys = {};
    currentCustomTheme.keys[keyVal] = {
      top: baseHex,
      bottom: adjustBrightness(baseHex, 0.85),
      shadow: adjustBrightness(baseHex, 0.65)
    };
  }
  
  setCalculatorTheme(currentCustomTheme);
  lsSet('hogar_calc_theme', JSON.stringify(currentCustomTheme));
}
